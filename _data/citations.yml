- authors: Venkatapathy, Sriram; Mirkin, Shachar
  title: An SMT-driven authoring tool
  publication: "Proceedings of COLING 2012: Demonstration Papers"
  pages: 459-466
  url: https://aclanthology.org/C12-3058/
  pdf: https://aclanthology.org/C12-3058.pdf
  year: 2012
  abstract: This paper presents a tool for assisting users in composing texts in a language they do not know. While Machine Translation (MT) is pretty useful for understanding texts in an unfamiliar language, current MT technology has yet to reach the stage where it can be used reliably without a post-editing step. This work attempts to make a step towards achieving this goal. We propose a tool that provides suggestions for the continuation of the text in the source language (that the user knows), creating texts that can be translated to the target language (that the user does not know). In terms of functionality, our tool resembles text prediction applications. However , the target language, through a Statistical Machine Translation (SMT) model, drives the composition and not only the source language. We present the user interface and describe the considerations that underline the suggestion process. A simulation of user interaction shows that composition speed can be substantially reduced and provides initial positive feedback as to the ability to generate better translations.
  citation_link: https://aclanthology.org/C12-3058/

- authors: Mirkin, Shachar; Venkatapathy, Sriram; Dymetman, Marc; Calapodescu, Ioan
  title: 'SORT: An Interactive Source-Rewriting Tool for Improved Translation'
  publication: ACL Demos
  url: https://aclanthology.org/P13-4015/
  pdf: https://aclanthology.org/P13-4015.pdf
  year: 2013
  abstract: The quality of automatic translation is affected by many factors. One is the divergence between the specific source and target languages. Another lies in the source text itself, as some texts are more complex than others. One way to handle such texts is to modify them prior to translation. Yet, an important factor that is often overlooked is the source translatability with respect to the specific translation system and the specific model that are being used. In this paper we present an interactive system where source modifications are induced by confidence estimates that are derived from the translation model in use. Modifications are automatically generated and proposed for the user’s approval. Such a system can reduce postediting effort, replacing it by cost-effective pre-editing that can be done by monolinguals. 1
  citation_link: https://aclanthology.org/P13-4015/

