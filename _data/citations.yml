- authors: Nowson, Scott; Perez, Julien; Brun, Caroline; Mirkin, Shachar; Roux, Claude
  title: XRCE personal language analytics engine for multilingual author profiling
  publication: Working Notes Papers of the CLEF
  pages: 1412-1424
  year: 2015
  abstract: This technical notebook describes the methodology used - and results achieved - for the PAN 2015 Author Profiling Challenge by the team from Xe- rox Research Centre Europe (XRCE). This year, personality traits are introduced alongside age and gender in a corpus of tweets in four languages - English, Span- ish, Italian and Dutch. We describe a largely language agnostic methodology for classification which uses language specific linguistic processing to generate fea- tures. We also report on experiments in which we use machine translation to accommodate for languages in which there is less training data. Native language results are successful, but socio-demographic signals in language seem to be lost under MT conditions.
  citation_link: https://scholar.google.com/scholar?q=XRCE+personal+language+analytics+engine+for+multilingual+author+profiling

- authors: Mirkin, Shachar; Meunier, Jean-Luc
  title: 'Personalized machine translation: Predicting translational preferences'
  publication: Proceedings of the 2015 conference on empirical methods in natural language processing
  pages: 2019-2025
  url: https://aclanthology.org/D15-1238/
  pdf: https://aclanthology.org/D15-1238.pdf
  year: 2015
  abstract: Machine Translation (MT) has advanced in recent years to produce better translations for clients' specific domains, and sophisticated tools allow professional translators to obtain translations according to their prior edits. We suggest that MT should be further personalized to the end-user level -the receiver or the author of the text -as done in other applications. As a step in that direction, we propose a method based on a recommender systems approach where the user's preferred translation is predicted based on preferences of similar users. In our experiments, this method outperforms a set of non-personalized methods, suggesting that user preference information can be employed to provide better-suited translations for each user.
  citation_link: https://aclanthology.org/D15-1238/

- authors: Mirkin, Shachar; Nowson, Scott; Brun, Caroline; Perez, Julien
  title: Motivating Personality-aware Machine Translation
  publication: The 2015 Conference on Empirical Methods on Natural Language Processing (EMNLP)
  url: https://aclanthology.org/D15-1130/
  pdf: https://aclanthology.org/D15-1130.pdf
  year: 2015
  abstract: Language use is known to be influenced by personality traits as well as by sociodemographic characteristics such as age or mother tongue.As a result, it is possible to automatically identify these traits of the author from her texts.It has recently been shown that knowledge of such dimensions can improve performance in NLP tasks such as topic and sentiment modeling.We posit that machine translation is another application that should be personalized.In order to motivate this, we explore whether translation preserves demographic and psychometric traits.We show that, largely, both translation of the source training data into the target language, and the target test data into the source language has a detrimental effect on the accuracy of predicting author traits.We argue that this supports the need for personal and personality-aware machine translation models.
  citation_link: https://aclanthology.org/D15-1130/

