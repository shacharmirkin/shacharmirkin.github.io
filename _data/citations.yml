- authors: Pahuja, Vardaan; Laha, Anirban; Mirkin, Shachar; Raykar, Vikas; Kotlerman, Lili; Lev, Guy
  title: Joint Learning of Correlated Sequence Labelling Tasks Using Bidirectional Recurrent Neural Networks
  publication: Interspeech 2017
  year: 2017
  abstract: The stream of words produced by Automatic Speech Recognition (ASR) systems is typically devoid of punctuations and formatting. Most natural language processing applications expect segmented and well-formatted texts as input, which is not available in ASR output. This paper proposes a novel technique of jointly modeling multiple correlated tasks such as punctuation and capitalization using bidirectional recurrent neural networks, which leads to improved performance for each of these tasks. This method could be extended for joint modeling of any other correlated sequence labeling tasks.
  citation_link: https://scholar.google.com/scholar?q=Joint+Learning+of+Correlated+Sequence+Labelling+Tasks+Using+Bidirectional+Recurrent+Neural+Networks

- authors: Mirkin, Shachar; Jacovi, Michal; Lavee, Tamar; Kuo, Hong-Kwang; Thomas, Samuel; Sager, Leslie; Kotlerman, Lili; Venezian, Elad; Slonim, Noam
  title: A recorded debating dataset
  publication: Proceedings of the Eleventh International Conference on Language Resources and Evaluation (LREC 2018)
  url: https://aclanthology.org/L18-1037/
  pdf: https://aclanthology.org/L18-1037.pdf
  year: 2018
  abstract: This paper describes an English audio and textual dataset of debating speeches, a unique resource for the growing research field of computational argumentation and debating technologies. We detail the process of speech recording by professional debaters, the transcription of the speeches with an Automatic Speech Recognition (ASR) system, their consequent automatic processing to produce a text that is more "NLP-friendly", and in parallel -- the manual transcription of the speeches in order to produce gold-standard "reference" transcripts. We release 60 speeches on various controversial topics, each in five formats corresponding to the different stages in the production of the data. The intention is to allow utilizing this resource for multiple research purposes, be it the addition of in-domain training data for a debate-specific ASR system, or applying argumentation mining on either noisy or clean debate transcripts. We intend to make further releases of this data in the future.
  citation_link: https://aclanthology.org/L18-1037/

- authors: Mass, Yosi; Kotlerman, Lili; Mirkin, Shachar; Venezian, Elad; Witzling, Gera; Slonim, Noam
  title: What did you mention? a large scale mention detection benchmark for spoken and written text
  publication: arXiv preprint arXiv:1801.07507
  year: 2018
  abstract: We describe a large, high-quality benchmark for the evaluation of Mention Detection tools. The benchmark contains annotations of both named entities as well as other types of entities, annotated on different types of text, ranging from clean text taken from Wikipedia, to noisy spoken data. The benchmark was built through a highly controlled crowd sourcing process to ensure its quality. We describe the benchmark, the process and the guidelines that were used to build it. We then demonstrate the results of a state-of-the-art system running on that benchmark.
  citation_link: https://arxiv.org/abs/1801.07507

