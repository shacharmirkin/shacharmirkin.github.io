- authors: Gupta, Anand; Kaur, Manpreet; Mirkin, Shachar; Singh, Adarsh; Goyal, Aseem
  title: Text summarization through entailment-based minimum vertex cover
  publication: Proceedings of the Third Joint Conference on Lexical and Computational Semantics (* SEM 2014)
  pages: 75-80
  url: https://aclanthology.org/S14-1010/
  pdf: https://aclanthology.org/S14-1010.pdf
  year: 2014
  abstract: Sentence Connectivity is a textual characteristic that may be incorporated intelligently for the selection of sentences of a well meaning summary. However, the existing summarization methods do not utilize its potential fully. The present paper introduces a novel method for singledocument text summarization. It poses the text summarization task as an optimization problem, and attempts to solve it using Weighted Minimum Vertex Cover (WMVC), a graph-based algorithm. Textual entailment, an established indicator of semantic relationships between text units, is used to measure sentence connectivity and construct the graph on which WMVC operates. Experiments on a standard summarization dataset show that the suggested algorithm outperforms related methods.
  citation_link: https://aclanthology.org/S14-1010/

- authors: Mirkin, Shachar; Bar-Haim, Roy; Dagan, Ido; Shnarch, Eyal; Stern, Asher; Szpektor, Idan; Berant, Jonathan
  title: Addressing Discourse and Document Structure in the RTE Search Task
  publication: TAC
  year: 2009
  abstract: 'This paper describes Bar-Ilan University’s submissions to RTE-5. This year we focused on the Search pilot, enhancing our entailment system to address two main issues introduced by this new setting: scalability and, primarily, document-level discourse. Our system achieved the highest score on the Search task amongst participating groups, and proposes first steps towards addressing this challenging setting. 1'
  citation_link: https://scholar.google.com/scholar?q=Addressing+Discourse+and+Document+Structure+in+the+RTE+Search+Task

- authors: Mirkin, Shachar; Besacier, Laurent
  title: Data Selection for Compact Adapted SMT Models
  publication: Proceedings of AMTA
  url: https://aclanthology.org/2014.amta-researchers.23/
  pdf: https://aclanthology.org/2014.amta-researchers.23.pdf
  year: 2014
  abstract: Data selection is a common technique for adapting statistical translation models for a specific domain, which has been shown to both improve translation quality and to reduce model size. Selection relies on some in-domain data, of the same domain of the texts expected to be trans-lated. Selecting the sentence-pairs that are most similar to the in-domain data from a pool of parallel texts has been shown to be effective; yet, this approach holds the risk of resulting in a limited coverage, when necessary n-grams that do appear in the pool are less similar to in-domain data that is available in advance. Some methods select additional data based on the actual text that needs to be translated. While useful, this is not always a practical scenario. In this work we describe an extensive exploration of data selection techniques over Arabic to French datasets, and propose methods to address both similarity and coverage considerations while maintaining a limited model size. 1
  citation_link: https://aclanthology.org/2014.amta-researchers.23/

- authors: Wuebker, Joern; Ney, Hermann; Martínez-Villaronga, Adrià; Giménez Pastor, Adrián; Juan Císcar, Alfonso; Servan, Christophe; Dymetman, Marc; Mirkin, Shachar
  title: Comparison of data selection techniques for the translation of video lectures
  year: 2014
  publisher: Association for Machine Translation in the Americas
  url: https://aclanthology.org/2014.amta-researchers.15/
  pdf: https://aclanthology.org/2014.amta-researchers.15.pdf
  abstract: For the task of online translation of scientific video lectures, using huge models is not possi-ble. In order to get smaller and efficient models, we perform data selection. In this paper, we perform a qualitative and quantitative comparison of several data selection techniques, based on cross-entropy and infrequent n-gram criteria. In terms of BLEU, a combination of transla-tion and language model cross-entropy achieves the most stable results. As another important criterion for measuring translation quality in our application, we identify the number of out-of-vocabulary words. Here, infrequent n-gram recovery shows superior performance. Finally, we combine the two selection techniques in order to benefit from both their strengths. 1
  citation_link: https://aclanthology.org/2014.amta-researchers.15/

