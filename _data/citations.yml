- authors: Bar-Haim, Roy; Berant, Jonathan; Dagan, Ido; Greental, Iddo; Mirkin, Shachar; Shnarch, Eyal; Szpektor, Idan
  title: Efficient semantic deduction and approximate matching over compact parse forests
  publication: Proceedings of TAC
  year: 2008
  abstract: Semantic inference is often modeled as application of entailment rules, which specify generation of entailed sentences from a source sentence. Efficient generation and representation of entailed consequents is a fundamental problem common to such inference methods. We present a new data structure, termed compact forest, which allows efficient generation and representation of entailed consequents, each represented as a parse tree. Rule-based inference is complemented with a new approximate matching measure inspired by tree kernels, which is computed efficiently over compact forests. Our system also makes use of novel large-scale entailment rule bases, derived from Wikipedia as well as from information about predicates and their argument mapping, gathered from available lexicons and complemented by unsupervised learning. 1
  citation_link: https://scholar.google.com/scholar?q=Efficient+semantic+deduction+and+approximate+matching+over+compact+parse+forests

- authors: Mirkin, Shachar; Specia, Lucia; Cancedda, Nicola; Dagan, Ido; Dymetman, Marc; Szpektor, Idan
  title: Source-language entailment modeling for translating unknown terms
  publication: Proceedings of the Joint Conference of the 47th Annual Meeting of the ACL and the 4th International Joint Conference on Natural Language Processing of the AFNLP
  pages: 791-799
  url: https://aclanthology.org/P09-1089/
  pdf: https://aclanthology.org/P09-1089.pdf
  year: 2009
  abstract: This paper addresses the task of handling unknown terms in SMT. We propose using source-language monolingual models and resources to paraphrase the source text prior to translation. We further present a conceptual extension to prior work by allowing translations of entailed texts rather than paraphrases only. A method for performing this process efficiently is presented and applied to some 2500 sentences with unknown terms. Our experiments show that the proposed approach substantially increases the number of properly translated texts.
  citation_link: https://aclanthology.org/P09-1089/

- authors: Mirkin, Shachar; Dagan, Ido; Geffet, Maayan
  title: Integrating pattern-based and distributional similarity methods for lexical entailment acquisition
  publication: Proceedings of the COLING/ACL 2006 Main Conference Poster Sessions
  pages: 579-586
  url: https://aclanthology.org/P06-2075/
  pdf: https://aclanthology.org/P06-2075.pdf
  year: 2006
  abstract: This paper addresses the problem of acquiring lexical semantic relationships, applied to the lexical entailment relation. Our main contribution is a novel conceptual integration between the two distinct acquisition paradigms for lexical relations - the pattern-based and the distributional similarity approaches. The integrated method exploits mutual complementary information of the two approaches to obtain candidate relations and informative characterizing features. Then, a small size training set is used to construct a more accurate supervised classifier, showing significant increase in both recall and precision over the original approaches.
  citation_link: https://aclanthology.org/P06-2075/

- authors: Mirkin, Shachar; Dagan, Ido; Shnarch, Eyal
  title: Evaluating the inferential utility of lexical-semantic resources
  publication: Proceedings of the 12th Conference of the European Chapter of the ACL (EACL 2009)
  pages: 558-566
  url: https://aclanthology.org/E09-1064/
  pdf: https://aclanthology.org/E09-1064.pdf
  year: 2009
  abstract: Lexical-semantic resources are used extensively for applied semantic inference, yet a clear quantitative picture of their current utility and limitations is largely missing.
  citation_link: https://aclanthology.org/E09-1064/

- authors: Mirkin, Shachar; Dagan, Ido; Padó, Sebastian
  title: Assessing the role of discourse references in entailment inference
  publication: Proceedings of the 48th Annual Meeting of the Association for Computational Linguistics
  pages: 1209-1219
  url: https://aclanthology.org/P10-1123/
  pdf: https://aclanthology.org/P10-1123.pdf
  year: 2010
  abstract: Discourse references, notably coreference and bridging, play an important role in many text understanding applications, but their impact on textual entailment is yet to be systematically understood. On the ba-sis of an in-depth analysis of entailment instances, we argue that discourse refer-ences have the potential of substantially improving textual entailment recognition, and identify a number of research direc-tions towards this goal. 1
  citation_link: https://aclanthology.org/P10-1123/

- authors: Abad, Azad; Bentivogli, Luisa; Dagan, Ido; Giampiccolo, Danilo; Mirkin, Shachar; Pianta, Emanuele; Stern, Asher
  title: A Resource for Investigating the Impact of Anaphora and Coreference on Inference
  publication: LREC
  url: https://aclanthology.org/L10-1338/
  pdf: http://www.lrec-conf.org/proceedings/lrec2010/pdf/488_Paper.pdf
  year: 2010
  abstract: Discourse phenomena play a major role in text processing tasks. However, so far relatively little study has been devoted to the relevance of discourse phenomena for inference. Therefore, an experimental study was carried out to assess the relevance of anaphora and coreference for Textual Entailment (TE), a prominent inference framework. First, the annotation of anaphoric and coreferential links in the RTE-5 Search data set was performed according to a specifically designed annotation scheme. As a result, a new data set was created where all anaphora and coreference instances in the entailing sentences which are relevant to the entailment judgment are solved and annotated. A by-product of the annotation is a new “augmented ” data set, where all the referring expressions which need to be resolved in the entailing sentences are replaced by explicit expressions. Starting from the final output of the annotation, the actual impact of discourse phenomena on inference engines was investigated, identifying the kind of operations that the systems need to apply to address discourse phenomena and trying to find direct mappings between these operation and annotation types. 1.
  citation_link: https://aclanthology.org/L10-1338/

- authors: Mirkin, Shachar; Berant, Jonathan; Dagan, Ido; Shnarch, Eyal
  title: Recognising entailment within discourse
  publication: Proceedings of the 23rd International Conference on Computational Linguistics
  pages: 770-778
  url: https://aclanthology.org/C10-1087/
  pdf: https://aclanthology.org/C10-1087.pdf
  year: 2010
  publisher: Association for Computational Linguistics
  abstract: Texts are commonly interpreted based on the entire discourse in which they are situated. Discourse processing has been shown useful for inference-based application; yet, most systems for textual entailment – a generic paradigm for applied inference – have only addressed discourse considerations via off-the-shelf coreference resolvers. In this paper we explore various discourse aspects in entailment inference, suggest initial solutions for them and investigate their impact on entailment performance. Our experiments suggest that discourse provides useful information, which significantly improves entailment inference, and should be better addressed by future entailment systems. 1
  citation_link: https://aclanthology.org/C10-1087/

- authors: Aziz, Wilker; Dymetman, Marc; Specia, Lucia; Mirkin, Shachar
  title: "Learning an expert from human annotations in statistical machine translation: The case of out-of-vocabulary words"
  publication: Proceedings of the 14th Annual Conference of the European Association for Machine Translation
  url: https://aclanthology.org/2010.eamt-1.31/
  pdf: https://aclanthology.org/2010.eamt-1.31.pdf
  year: 2010
  abstract: We present a general method for incorporating an “expert ” model into a Statistical Machine Translation (SMT) system, in order to improve its performance on a particular “area of expertise”, and apply this method to the specific task of finding adequate replacements for Out-of-Vocabulary (OOV) words. Candidate replacements are paraphrases and entailed phrases, obtained using monolingual resources. These candidate replacements are transformed into “dynamic biphrases”, generated at decoding time based on the context of each source sentence. Standard SMT features are enhanced with a number of new features aimed at scoring translations produced by using different replacements. Active learning is used to discriminatively train the model parameters from human assessments of the quality of translations. The learning framework yields an SMT system which is able to deal with sentences containing OOV words but also guarantees that the performance is not degraded for input sentences without OOV words. Results of experiments on English-French translation show that this method outperforms previous work addressing OOV words in terms of acceptability. 1
  citation_link: https://aclanthology.org/2010.eamt-1.31/

- authors: Stern, Asher; Shnarch, Eyal; Mirkin, Shachar; Kotlerman, Lili; Zeichner, Naomi; Dagan, Ido; Lotan, Amnon; Berant, Jonathan
  title: Rule Chaining and Approximate Match in textual inference
  publication: TAC
  year: 2010
  abstract: This paper describes the participation of Bar-Ilan university in the sixth RTE challenge. Our textual-entailment engine, BiuTee, was enhanced with new components that introduce chaining of lexical-entailment rules, and tackle the problem of approximately matching the text and the hypothesis after all available knowledge of entailment rules was utilized. We have also re-engineered our system aiming at an open-source open architecture. BiuTee’s performance is better than the median of all-submissions, and outperforms significantly an IR-oriented baseline. 1
  citation_link: https://scholar.google.com/scholar?q=Rule+Chaining+and+Approximate+Match+in+textual+inference

- authors: Mirkin, Shachar; Dagan, Ido; Kotlerman, Lili; Szpektor, Idan
  title: Classification-based contextual preferences
  publication: Proceedings of the TextInfer 2011 Workshop on Textual Entailment
  pages: 20-29
  url: https://aclanthology.org/W11-2403/
  pdf: https://aclanthology.org/W11-2403.pdf
  year: 2011
  abstract: This paper addresses context matching in tex-tual inference. We formulate the task under the Contextual Preferences framework which broadly captures contextual aspects of infer-ence. We propose a generic classification-based scheme under this framework which co-herently attends to context matching in infer-ence and may be employed in any inference-based task. As a test bed for our scheme we use the Name-based Text Categorization (TC) task. We define an integration of Contextual Prefer-ences into the TC setting and present a concrete self-supervised model which instantiates the generic scheme and is applied to address con-text matching in the TC task. Experiments on standard TC datasets show that our approach outperforms the state of the art in context mod-eling for Name-based TC. 1
  citation_link: https://aclanthology.org/W11-2403/

- authors: Stern, Asher; Mirkin, Shachar; Shnarch, Eyal; Kotlerman, Lili; Dagan, Ido; Lotan, Amnon; Berant, Jonathan
  title: Knowledge and Tree-Edits in Learnable Entailment Proofs
  publication: TAC
  year: 2011
  abstract: This paper describes BIUTEE - Bar Ilan University Textual Entailment Engine. BIUTEE is a natural language inference system in which the hypothesis is proven by the text, based on linguistic- and world- knowledge resources, as well as syntactically motivated tree transformations. The main progress in BIUTEE in the last year is a new confidence model that estimates the validity of the proof found by BIUTEE.
  citation_link: https://scholar.google.com/scholar?q=Knowledge+and+Tree-Edits+in+Learnable+Entailment+Proofs

