name: Preview GitHub Pages

on:
  push:
    branches-ignore:
      - main

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        
    - name: Install dependencies
      run: |
        gem install bundler
        bundle install
        
    - name: Update baseurl for preview
      run: |
        sed -i 's/baseurl: ""/baseurl: "\/gh-pages-preview\/preview\/${{ github.ref_name }}"/' _config.yml
        
    - name: Build site
      run: bundle exec jekyll build
      
    - name: Create .nojekyll file
      run: touch _site/.nojekyll
      
    - name: Deploy preview
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        destination_dir: preview/${{ github.ref_name }}
        publish_branch: gh-pages-preview
        keep_files: true

    - name: Print preview URL
      run: |
        echo "==================== PREVIEW URL ===================="
        echo "https://shacharmirkin.github.io/gh-pages-preview/preview/${{ github.ref_name }}/"
        echo "======================================================"