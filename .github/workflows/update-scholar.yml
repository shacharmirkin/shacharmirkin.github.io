name: Update Scholar citations

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.6.14"

      - name: Sync Python dev deps (uv)
        run: uv sync --frozen --group dev

      - name: Refresh citation count
        run: uv run python scripts/enrich_citations.py --scholar-only

      - name: Commit and push if changed
        run: |
          if git diff --quiet _data/scholar.yml; then
            echo "Citation count unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.yml
          git commit -m "$(cat <<'EOF'
chore: refresh Google Scholar citation count

EOF
)"
          git push
